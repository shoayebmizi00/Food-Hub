services:
  postgres:
    image: postgres:16-alpine
    container_name: food-corner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: foodcorner
      POSTGRES_PASSWORD: foodcorner
      POSTGRES_DB: foodcorner
    ports:
      - "5432:5432"
    volumes:
      - food_corner_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodcorner -d foodcorner"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  food_corner_postgres:
